const catLabels = {

};

let city = 'sp';
let cat = Object.keys(catLabels.sp)[0];

function setCity(c) {
  city = c;
  cat = Object.keys(catLabels[c])[0];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&c==='sp')||(i===1&&c==='rj')));
  renderCats();
  renderItems();
}

function setCat(c) {
  cat = c;
  renderCats();
  renderItems();
}

function renderCats() {
  const el = document.getElementById('cat-tabs');
  el.innerHTML = Object.entries(catLabels[city]).map(([k,v]) =>
    `<button class="cat-tab${cat===k?' active':''}" onclick="setCat('${k}')">${v}</button>`
  ).join('');
}

function renderItems() {
  const items = data[city][cat] || [];
  const el = document.getElementById('items-grid');
  if (!items.length) { el.innerHTML = '<div class="empty">No hay lugares en esta categoría</div>'; return; }
  el.innerHTML = items.map(item => {
    const badgeClass = item.badge === 'free' ? 'badge-free' : item.badge === 'night' ? 'badge-night' : item.badge === 'activity' ? 'badge-activity' : 'badge-paid';
    const badgeText = item.badge === 'free' ? 'Gratis' : item.badge === 'night' ? 'Vida nocturna' : item.badge === 'activity' ? 'Actividad' : 'Con costo';
    const priceHTML = item.price > 0
      ? `<div class="price-box"><div class="price-brl">${fp(item.price)}</div><div class="price-cop">${fop(item.price)}</div></div>`
      : `<div class="price-box"><div class="price-brl" style="color:var(--color-text-success)">Entrada gratuita</div></div>`;
    const tipHTML = item.tip ? `<div class="tip-box">💡 ${item.tip}</div>` : '';
    return `<div class="item-card">
      <div class="item-header">
        <div class="item-name">${item.name}</div>
        <span class="item-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="item-desc">${item.desc}</div>
      <div class="item-meta">
        <div class="meta-row"><span class="meta-label">Horario</span><span>${item.hours}</span></div>
      </div>
      ${priceHTML}
      ${tipHTML}
    </div>`;
  }).join('');
}

renderCats();
renderItems();
</script>
